const { useState, useEffect, useRef, useCallback } = React;

// Call Render directly — Netlify's proxy buffers SSE and truncates streams.
const BACKEND = 'https://ghostoperator.onrender.com';

  { id: 'gemini-2.5-flash-lite',  icon: '💨', name: '2.5 Flash Lite',  rpm: 30,  daily: 1500, rate: '30 rpm · 1500/day',  desc: 'More quota · lightweight' },
  { id: 'gemini-flash-latest',    icon: '🔄', name: 'Flash Latest',    rpm: 10,  daily: null, rate: '10 rpm',              desc: 'Tracks current release' },

  { id: 'confident',  label: 'Confident / Powerful',  tones: ['Bold','Strong','Fierce','Assertive','Magnetic','Fearless'] },
  { id: 'dark',       label: 'Dark / Moody',          tones: ['Moody','Mysterious','Edgy','Gritty','Brooding','Intense'] },

};

// ─── Rate limit tracker ───────────────────────────────────────────────────────
function useModelUsage() {
  const getStore = () => {
    try {
      const raw = localStorage.getItem('go_usage');
      const s = raw ? JSON.parse(raw) : {};
      const today = new Date().toDateString();
      if (s.date !== today) return { date: today, models: {} };
      return s;
    } catch { return { date: new Date().toDateString(), models: {} }; }
  };

  const [store, setStore] = useState(getStore);

  const recordUse = (modelId, count = 1) => {
    const s = getStore();
    s.models[modelId] = (s.models[modelId] || 0) + count;
    try { localStorage.setItem('go_usage', JSON.stringify(s)); } catch {}
    setStore({ ...s });
  };

  const getUsage = (modelId) => store.models[modelId] || 0;

  // Returns: null | 'warn' | 'limit'
  const getStatus = (model) => {
    if (!model.daily) return null;
    const used = getUsage(model.id);
    if (used >= model.daily) return 'limit';
    if (used >= Math.floor(model.daily * 0.8)) return 'warn';
    return null;
  };

  return { recordUse, getUsage, getStatus };
}

// ─── Icon ─────────────────────────────────────────────────────────────────────

    copy:     <><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></>,
    star:     <path d="M12 2l3 7 7 .6-5.3 4.7 1.6 7-6.3-3.7-6.3 3.7 1.6-7L2 9.6 9 9l3-7z" fill="currentColor" stroke="none"/>,
    starO:    <path d="M12 2l3 7 7 .6-5.3 4.7 1.6 7-6.3-3.7-6.3 3.7 1.6-7L2 9.6 9 9l3-7z"/>,
    refresh:  <><path d="M3 12a9 9 0 0115.5-6.3L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 01-15.5 6.3L3 16"/><path d="M3 21v-5h5"/></>,
    edit:     <><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 113 3L7 19l-4 1 1-4 12.5-12.5z"/></>,

// ─── Model selector (reusable) ────────────────────────────────────────────────
function ModelSelector({ model, setModel, getUsage, getStatus, compact = false }) {
  const [open, setOpen] = useState(false);

  useEffect(() => {
    if (!open) return;
    const h = (e) => { if (!e.target.closest('.model-select-wrap')) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);

  const status = getStatus(model);
  const used   = getUsage(model.id);

  return (
    <div className="model-select-wrap" style={{ position: 'relative' }}>
      <button className={`model-select ${compact ? 'compact' : ''}`} onClick={() => setOpen(o => !o)}>
        <span className="left">
          <span className="model-icon"><Icon name="bolt" size={12}/></span>
          <span>
            <div className="model-name">{model.name}</div>
            {!compact && <div className="model-rate">{model.rate}</div>}
          </span>
        </span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          {status === 'limit' && <span className="limit-badge limit">LIMIT</span>}
          {status === 'warn'  && <span className="limit-badge warn">~{model.daily - used} left</span>}
          <span className="model-caret"><Icon name="chevDown" size={12}/></span>
        </span>
      </button>

      {open && (
        <div className="model-dropdown">
          {MODELS.map(m => {
            const ms   = getStatus(m);
            const mu   = getUsage(m.id);
            const pct  = m.daily ? Math.min(100, Math.round((mu / m.daily) * 100)) : 0;
            return (
              <div key={m.id}
                   className={`model-option ${model.id === m.id ? 'selected' : ''} ${ms === 'limit' ? 'depleted' : ''}`}
                   onClick={() => { setModel(m); setOpen(false); }}>
                <div className="model-option-top">
                  <span>{m.icon} {m.name}</span>
                  {ms === 'limit' && <span className="limit-badge limit">Limit reached</span>}
                  {ms === 'warn'  && <span className="limit-badge warn">{m.daily - mu} left today</span>}
                </div>
                <div className="model-option-sub">{m.desc} · {m.rate}</div>
                {m.daily && (
                  <div className="model-usage-bar">
                    <div className="model-usage-fill" style={{ width: `${pct}%`, background: ms === 'limit' ? 'var(--danger)' : ms === 'warn' ? 'var(--warn)' : 'var(--accent)' }}/>
                    <span className="model-usage-label">{mu} / {m.daily} today</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── ToneSelector ─────────────────────────────────────────────────────────────
function ToneSelector({ tones, setTones }) {
  const [activeGroup, setActiveGroup] = useState(TONE_GROUPS[0].id); // default: Romantic/Flirty

  const currentGroup = TONE_GROUPS.find(g => g.id === activeGroup);

  const toggle = (tn) => {
    setTones(prev =>
      prev.includes(tn)
        ? prev.filter(x => x !== tn)
        : prev.length < 4 ? [...prev, tn] : prev
    );
  };

  return (
    <div className="tone-selector">
      {/* Header: label + selected pills */}
      <div className="tone-selector-hd">
        <span className="tone-selector-label">
          Tone — pick up to 4
          {tones.length === 4 && <span className="tone-max-hint"> (max)</span>}
        </span>
        {tones.length > 0 && (
          <div className="selected-tones">
            {tones.map(tn => (
              <span key={tn} className="selected-tone-pill" onClick={() => toggle(tn)}>
                {tn}<span className="rm"> ×</span>
              </span>
            ))}
          </div>
        )}
      </div>

      {/* Category tabs */}
      <div className="tone-cats">
        {TONE_GROUPS.map(g => (
          <button
            key={g.id}
            className={`tone-cat ${activeGroup === g.id ? 'active' : ''}`}
            onClick={() => setActiveGroup(g.id)}
          >
            {g.label}
          </button>
        ))}
      </div>

      {/* Subtone chips */}
      <div className="tone-chips">
        {currentGroup.tones.map(tn => {
          const on      = tones.includes(tn);
          const maxed   = !on && tones.length >= 4;
          return (
            <button
              key={tn}
              className={`tone-chip ${on ? 'on' : ''} ${maxed ? 'maxed' : ''}`}
              onClick={() => !maxed && toggle(tn)}
            >
              {on && <span className="x"><Icon name="check" size={10}/></span>}
              {tn}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Screen-size based mobile detection
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= 767);
  useEffect(() => {
    const h = () => setIsMobile(window.innerWidth <= 767);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);

  // Mobile tab navigation
  const [activeTab, setActiveTab] = useState('source');

  // Image state
  const [hasImage, setHasImage]         = useState(false);
  const [dragOver, setDragOver]         = useState(false);
  const [sourceUrl, setSourceUrl]       = useState(null);
  const [sourceName, setSourceName]     = useState('');

  // OCR state
  const [parsedThread, setParsedThread] = useState([]);
  const [ocrStatus, setOcrStatus]       = useState('idle');

  // Parameters
  const [tones, setTones]   = useState(['Casual', 'Flirty', 'Charming']);
  const [length, setLength] = useState('default');
  const [context, setContext] = useState('');
  const [model, setModel]   = useState(MODELS[0]);
  const [homeModelOpen, setHomeModelOpen] = useState(false);

  // Generation state
  const [phase, setPhase]           = useState('ready');
  const [candidates, setCandidates] = useState([]);
  const [starred, setStarred]       = useState({});

  // Usage tracking
  const { recordUse, getUsage, getStatus } = useModelUsage();

  // UI
  const [toast, setToast]      = useState(null);
  const fileInputRef   = useRef(null);
  const cameraInputRef = useRef(null);
  const sessionId = useRef(Math.random().toString(36).slice(2,8).toUpperCase()).current;

  // Apply theme and density
  useEffect(() => {
    document.body.dataset.theme   = t.theme;
    document.body.dataset.density = t.density;
  }, [t.theme, t.density]);

  // Keyboard: Cmd/Ctrl+Enter to generate
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        if (hasImage && phase !== 'generating') generate();
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  });

  // Paste image from clipboard
  useEffect(() => {
    const onPaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const it of items) {
        if (it.type.startsWith('image/')) {
          const file = it.getAsFile();
          if (file) handleFile(file);
          break;
        }
      }
    };
    window.addEventListener('paste', onPaste);
    return () => window.removeEventListener('paste', onPaste);
  }, [model]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  };

  // ── handleFile ────────────────────────────────────────────────────────────
  const handleFile = async (file) => {
    if (!file?.type.startsWith('image/')) {
      showToast('Please drop an image file (PNG, JPG, WebP)');
      return;
    }

    // Warn before using if at limit
    if (getStatus(model) === 'limit') {
      showToast('Daily limit reached for this model — switch to another');
      return;
    }

    if (sourceUrl) URL.revokeObjectURL(sourceUrl);

    const url = URL.createObjectURL(file);
    setSourceUrl(url);
    setSourceName(file.name || 'screenshot.png');
    setHasImage(true);
    setOcrStatus('scanning');
    setParsedThread([]);
    setCandidates([]);
    setPhase('ready');

    // Auto-advance to params on mobile
    if (isMobile) setActiveTab('params');

    const fd = new FormData();
    fd.append('image', file);
    fd.append('model', model.id);

    try {
      const res = await fetch(`${BACKEND}/api/ocr`, { method: 'POST', body: fd });
      recordUse(model.id, 1); // count OCR call
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || `HTTP ${res.status}`);
      }
      const { thread } = await res.json();
      setParsedThread(thread || []);
      setOcrStatus('done');
      if (!thread || thread.length === 0) showToast('No messages detected — check the screenshot');

      // Warn if now approaching limit
      const st = getStatus(model);
      if (st === 'limit') showToast('Daily limit reached for ' + model.name + ' — switch model');
      else if (st === 'warn') showToast('Approaching daily limit for ' + model.name);
    } catch (err) {
      console.error('OCR error:', err);
      setOcrStatus('error');
      showToast('OCR failed — try a clearer screenshot');
    }
  };

  // ── generate ──────────────────────────────────────────────────────────────
  const generate = async () => {
    if (getStatus(model) === 'limit') {
      showToast('Daily limit reached for ' + model.name + ' — switch model in parameters');
      return;
    }

    setPhase('generating');
    setStarred({});

    if (isMobile) setActiveTab('results');

    const requested = (tones.length ? tones : ['Casual', 'Flirty', 'Charming']).slice(0, 4);
    const skeletons = requested.map((tn, i) => ({
      id: `c${i}-${tn.toLowerCase()}`, tone: tn, text: '', streaming: true,
    }));
    setCandidates(skeletons);

    try {
      const res = await fetch(`${BACKEND}/api/draft-replies`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ thread: parsedThread, tones: requested, length, context, model: model.id }),
      });

      recordUse(model.id, requested.length); // each draft = 1 call

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') {
            setCandidates(prev => prev.map(c => c.streaming ? { ...c, streaming: false } : c));
            setPhase('result');
            continue;
          }
          try {
            const chunk = JSON.parse(raw);
            if (chunk.error) {
              showToast(chunk.errCode === 'RATE_LIMIT'
                ? 'Rate limit hit — try a different model'
                : 'Generation failed — check console');
              console.error('Draft error:', chunk);
              continue;
            }
            if (chunk.delta !== undefined) {
              setCandidates(prev => prev.map(c =>
                c.id === chunk.id ? { ...c, text: c.text + chunk.delta } : c
              ));
            } else if (chunk.done) {
              setCandidates(prev => prev.map(c =>
                c.id === chunk.id
                  ? { ...c, streaming: false, tokens: chunk.tokens || 0, latency: chunk.latency || '—', confidence: chunk.confidence || 0.8 }
                  : c
              ));
            }
          } catch { /* malformed chunk */ }
        }
      }
    } catch (err) {
      console.error('Generate error:', err);
      showToast('Generation failed');
      setCandidates(prev => prev.map(c => c.streaming ? { ...c, streaming: false, text: '(generation failed)' } : c));
      setPhase('ready');
      return;
    }

    setPhase(p => p === 'generating' ? 'result' : p);

    // Post-generate limit warning
    const st = getStatus(model);
    if (st === 'limit') showToast('Daily limit reached for ' + model.name + ' — switch model');
    else if (st === 'warn') showToast('Approaching daily limit for ' + model.name);
  };

  // ── regenerate one ────────────────────────────────────────────────────────
  const regenerateOne = async (idx) => {
    const cand = candidates[idx];
    if (!cand) return;

    setCandidates(prev => prev.map((c, i) => i === idx ? { ...c, streaming: true, text: '' } : c));

    try {
      const res = await fetch(`${BACKEND}/api/draft-replies`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ thread: parsedThread, tones: [cand.tone], length, context, model: model.id }),
      });
      recordUse(model.id, 1);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '', newText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') continue;
          try {
            const chunk = JSON.parse(raw);
            if (chunk.delta) {
              newText += chunk.delta;
              setCandidates(prev => prev.map((c, i) => i === idx ? { ...c, text: newText } : c));
            } else if (chunk.done) {
              setCandidates(prev => prev.map((c, i) =>
                i === idx ? { ...c, streaming: false, tokens: chunk.tokens || 0, latency: chunk.latency || '—', confidence: chunk.confidence || 0.8 } : c
              ));
            }
          } catch { }
        }
      }
    } catch (err) {
      console.error('Regen error:', err);
      showToast('Regeneration failed');
      setCandidates(prev => prev.map((c, i) => i === idx ? { ...c, streaming: false } : c));
    }
    showToast('Regenerated');
  };

  const copyText = (text) => {
    if (navigator.clipboard) navigator.clipboard.writeText(text);
    showToast('Copied to clipboard');
  };

  const resetImage = () => {
    if (sourceUrl) URL.revokeObjectURL(sourceUrl);
    setHasImage(false);
    setSourceUrl(null);
    setSourceName('');
    setParsedThread([]);
    setOcrStatus('idle');
    setCandidates([]);
    setPhase('ready');
    setActiveTab('source');
  };

  // ─── Topbar ──────────────────────────────────────────────────────────────────
  const Topbar = (
    <header className="topbar">
      <div className="brand">
        <div className="brand-mark" />
        <div className="brand-text">
          <span className="brand-name">GHOST_OPERATOR</span>
          <span className="brand-sub">Intercept · Analyze · Reply</span>
        </div>
      </div>
      <div className="topbar-meta">
        <span><span className="dot" />Channel Live</span>
        <span>Session · {sessionId}</span>
        <span>{new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false })} UTC</span>
      </div>
    </header>
  );

  // ─── Mobile Tab Bar ───────────────────────────────────────────────────────────
  const MobileTabBar = hasImage ? (
    <nav className="mobile-tabs">
      {[
        { id: 'source',  label: '01 · Source'  },
        { id: 'params',  label: '02 · Params'  },
        { id: 'results', label: '03 · Replies' },
      ].map(tab => (
        <button key={tab.id}
          className={`mobile-tab ${activeTab === tab.id ? 'active' : ''}`}
          onClick={() => setActiveTab(tab.id)}>
          {tab.label}
        </button>
      ))}
    </nav>
  ) : null;

  // ─── Hidden file inputs ────────────────────────────────────────────────────────
  const FileInputs = (
    <>
      <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}}
             onChange={(e) => { const f = e.target.files?.[0]; if (f) handleFile(f); e.target.value=''; }} />
      <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}}
             onChange={(e) => { const f = e.target.files?.[0]; if (f) handleFile(f); e.target.value=''; }} />
    </>
  );

  // ─── Limit alert banner (shown on home page if current model is at/near limit) ─
  const modelStatus = getStatus(model);
  const LimitBanner = modelStatus ? (
    <div className={`limit-banner ${modelStatus}`}>
      <Icon name="warn" size={13}/>
      {modelStatus === 'limit'
        ? <span><strong>{model.name}</strong> has reached its daily limit. Switch model below before scanning.</span>
        : <span><strong>{model.name}</strong> is approaching its daily limit ({model.daily - getUsage(model.id)} requests left today).</span>
      }
    </div>
  ) : null;

  // ─── EMPTY STATE ──────────────────────────────────────────────────────────────
  if (!hasImage) {
    return (
      <div className="app">
        {Topbar}
        {FileInputs}
        {LimitBanner}
        <div className="workspace no-image">
          <div className="col">
            <div className="empty-stage">
              <div className="empty-heading">
                <div className="ticker">Awaiting intercept</div>
                <h1>Read the room<br /><em>for you.</em></h1>
                <p>Drop a chat screenshot. GhostOperator reads the thread, weighs the tone, and drafts candidate replies you can actually send.</p>
              </div>

              {/* ── Model selector on home page ── */}
              <div className="home-model-row">
                <span className="home-model-label">Model</span>
                <div style={{ flex: 1, maxWidth: 320 }}>
                  <ModelSelector
                    model={model}
                    setModel={setModel}
                    getUsage={getUsage}
                    getStatus={getStatus}
                    compact={false}
                  />
                </div>
              </div>

              <div
                className={`dropzone ${dragOver ? 'drag' : ''}`}
                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={(e) => {
                  e.preventDefault(); setDragOver(false);
                  const file = e.dataTransfer.files[0];
                  if (file) handleFile(file);
                }}
              >
                <div className="corners">
                  <span className="tl"/><span className="tr"/>
                  <span className="bl"/><span className="br"/>
                </div>
                <div className="drop-actions">
                  <div className="chip-action" onClick={() => fileInputRef.current?.click()}>
                    <Icon name="image" /> Browse files
                  </div>
                  {/* Camera: visible on mobile via CSS, hidden on desktop */}
                  <span className="drop-divider mobile-only">— OR —</span>
                  <div className="chip-action camera-chip" onClick={() => cameraInputRef.current?.click()}>
                    <Icon name="camera" size={15}/> Take photo
                  </div>
                  {/* Paste + Drag: hidden on mobile via CSS */}
                  <span className="drop-divider desktop-only">— OR —</span>
                  <div className="chip-action desktop-only">
                    <kbd>⌘V</kbd> Paste from clipboard
                  </div>
                  <span className="drop-divider desktop-only">— OR —</span>
                  <div className="chip-action desktop-only">
                    <Icon name="arrow" /> Drag in
                  </div>
                </div>
                <div className="drop-meta">PNG · JPG · WEBP — max 20 MB</div>
              </div>
            </div>
          </div>
        </div>
        <footer className="statusbar">
          <div className="group">
            <span>● Idle</span>
            <div className="sep"/>
            <span>Model · {model.name}</span>
            {modelStatus === 'limit' && <><div className="sep"/><span style={{color:'var(--danger)'}}>● Limit reached</span></>}
            {modelStatus === 'warn'  && <><div className="sep"/><span style={{color:'var(--warn)'}}>● Near limit</span></>}
          </div>
          <div className="group status-right">
            <span>GhostOperator v2 · End-to-end encrypted</span>
          </div>
        </footer>
        <TweaksPanelUI t={t} setTweak={setTweak} />
        {toast && <div className="toast">▸ {toast}</div>}
      </div>
    );
  }

  // ─── FULL STATE (3-column layout) ─────────────────────────────────────────────
  return (
    <div className="app">
      {Topbar}
      {MobileTabBar}
      {FileInputs}
      <div className="workspace">

        {/* ── LEFT: Source ── */}
        <div className={`col left ${activeTab === 'source' ? 'tab-active' : ''}`}>
          <div className="section-label">01 · Source</div>

          <div className="src-preview">
            <div className="src-preview-hd">
              <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:180}}>{sourceName}</span>
              <button className="swap" onClick={resetImage}>swap ⤴</button>
            </div>
            {sourceUrl && (
              <div style={{padding:'10px 10px 0'}}>
                <div className="thumb" style={{backgroundImage:`url(${sourceUrl})`,backgroundSize:'cover',backgroundPosition:'top center',height:90}}>
                  {ocrStatus === 'scanning' && <div className="scan" />}
                  {ocrStatus === 'scanning' && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(10,11,13,.65)',fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.18em',color:'var(--accent)'}}>SCANNING…</div>}
                  {ocrStatus === 'done'     && <div style={{position:'absolute',bottom:6,right:8,fontFamily:'var(--mono)',fontSize:9,letterSpacing:'.14em',color:'var(--accent)',textTransform:'uppercase',background:'rgba(10,11,13,.7)',padding:'2px 6px',borderRadius:3}}>OCR COMPLETE</div>}
                  {ocrStatus === 'error'    && <div style={{position:'absolute',bottom:6,right:8,fontFamily:'var(--mono)',fontSize:9,letterSpacing:'.14em',color:'var(--danger)',textTransform:'uppercase',background:'rgba(10,11,13,.7)',padding:'2px 6px',borderRadius:3}}>OCR ERROR</div>}
                </div>
              </div>
            )}
            <div className="src-preview-body">
              {ocrStatus === 'scanning' && (
                <div style={{padding:'12px 0',display:'flex',flexDirection:'column',gap:8}}>
                  {[90,70,55].map((w,i) => <div key={i} className="skel" style={{width:`${w}%`,height:12,borderRadius:4}}/>)}
                </div>
              )}
              {ocrStatus === 'error' && (
                <div style={{padding:'12px 0',fontFamily:'var(--mono)',fontSize:11,color:'var(--danger)',letterSpacing:'.04em'}}>
                  Could not parse thread. Try a clearer screenshot.
                </div>
              )}
              {ocrStatus === 'done' && parsedThread.length === 0 && (
                <div style={{padding:'12px 0',fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-fade)',letterSpacing:'.04em'}}>
                  No messages detected.
                </div>
              )}
              {parsedThread.map((m, i) => (
                <div key={i} className={`bubble-row ${m.who}`}>
                  <div className={`bubble ${m.who}`}>
                    {m.text}
                    {m.t && <span className="tstamp">{m.t}</span>}
                  </div>
                </div>
              ))}
              {parsedThread.length > 0 && (
                <div className="thread-meta">
                  <span>parsed · {parsedThread.length} msg</span>
                  <span>conf 94%</span>
                </div>
              )}
            </div>
          </div>

          {/* Mobile: continue button */}
          <button className="btn-mobile-next" onClick={() => setActiveTab('params')}>
            Set Parameters →
          </button>

          {t.showHistory && (
            <>
              <div className="section-label">Recent intercepts</div>
              <div className="history">
                <div className="history-item" style={{opacity:.4}}>
                  <div className="history-thumb"/>
                  <div className="history-text" style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-fade)'}}>No history yet</div>
                </div>
              </div>
            </>
          )}
        </div>

        {/* ── CENTER: Parameters ── */}
        <div className={`col center ${activeTab === 'params' ? 'tab-active' : ''}`}>
          <div className="section-label">02 · Parameters</div>

          <div className="controls-card">
            <ToneSelector tones={tones} setTones={setTones} />

            <div className="controls-grid">
              <div className="field">
                <label>Length</label>
                <div className="tone-chips">
                  {['shorter','default','longer'].map(l => (
                    <button key={l} className={`tone-chip ${length === l ? 'on' : ''}`}
                            onClick={() => setLength(l)}>{l}</button>
                  ))}
                </div>
              </div>

              <div className="field">
                <label>Model</label>
                <ModelSelector
                  model={model}
                  setModel={setModel}
                  getUsage={getUsage}
                  getStatus={getStatus}
                />
              </div>
            </div>

            <div className="field">
              <label>
                Context / instructions{' '}
                <span className="hint" style={{marginLeft:8,textTransform:'none',letterSpacing:0}}>optional</span>
              </label>
              <textarea
                placeholder="e.g. She just replied to my karaoke joke. Keep it light, no apologies."
                value={context}
                onChange={(e) => setContext(e.target.value)}
                maxLength={300}
              />
              <span className="hint" style={{alignSelf:'flex-end'}}>{context.length} / 300</span>
            </div>

            <div className="cta-row">
              <button
                className="btn-generate"
                disabled={phase === 'generating' || ocrStatus === 'scanning' || modelStatus === 'limit'}
                onClick={generate}
              >
                {phase === 'generating' ? (
                  <>● ● ● Drafting candidates…</>
                ) : (
                  <>
                    <Icon name="bolt" size={12}/>
                    Generate {tones.length || 3} repl{tones.length === 1 ? 'y' : 'ies'}
                    <span className="kbd">⌘↵</span>
                  </>
                )}
              </button>
              <button className="btn-ghost" onClick={() => {
                setContext(''); setTones(['Casual','Flirty','Charming']); setLength('default');
              }}>Reset</button>
            </div>
          </div>

          <div style={{
            display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
            border:'1px solid var(--line)',borderRadius:6,background:'rgba(255,255,255,.015)',
            fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-dim)',letterSpacing:'.04em',
          }}>
            <span style={{color:'var(--accent)'}}>▸</span>
            Tip — star a reply to lock it as a tone reference. Future drafts will lean toward that voice.
          </div>
        </div>

        {/* ── RIGHT: Candidates ── */}
        <div className={`col right ${activeTab === 'results' ? 'tab-active' : ''}`}>
          <div className="intercept-hd">
            <div className="section-label" style={{margin:0}}>03 · Candidate replies</div>
            {phase === 'result' && (
              <button className="regenerate" onClick={generate}>
                <Icon name="refresh" size={11}/>REGEN ALL
              </button>
            )}
          </div>

          {candidates.length === 0 && phase === 'ready' && (
            <div style={{
              flex:1,display:'flex',alignItems:'center',justifyContent:'center',
              fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-fade)',letterSpacing:'.1em',
              textTransform:'uppercase',textAlign:'center',lineHeight:1.8,
            }}>
              {ocrStatus === 'done' ? 'Set parameters and generate' : ocrStatus === 'scanning' ? 'Scanning image…' : 'Configure and generate'}
            </div>
          )}

          <div className="candidates">
            {candidates.map((c, idx) => (
              <div key={c.id} className={`cand ${c.streaming ? 'streaming' : ''} ${starred[c.id] ? 'starred' : ''}`}>
                <div className="cand-hd">
                  <div className="cand-tag">
                    <span className="num">{String(idx + 1).padStart(2, '0')}</span>
                    {c.tone}
                  </div>
                  {!c.streaming && c.confidence > 0 && (
                    <div className="cand-conf">
                      <span>conf</span>
                      <div className="conf-bar"><span style={{width:`${Math.round(c.confidence * 100)}%`}}/></div>
                      <span>{Math.round(c.confidence * 100)}</span>
                    </div>
                  )}
                </div>

                <div className="cand-body">
                  {c.streaming ? (
                    c.text ? c.text : (
                      <><div className="skel w-90"/><div className="skel w-70"/><div className="skel w-40"/></>
                    )
                  ) : (c.text || <span style={{color:'var(--ink-fade)',fontStyle:'italic',fontSize:12}}>No content generated</span>)}
                </div>

                {!c.streaming && (
                  <div className="cand-meta">
                    <div className="stats">
                      {c.tokens > 0 && <span>{c.tokens} tok</span>}
                      {c.latency && c.latency !== '—' && <span>{c.latency}s</span>}
                    </div>
                    <div className="cand-actions">
                      <button className="iconbtn" title="Edit" onClick={() => {
                        const ed = prompt('Edit reply', c.text);
                        if (ed !== null) setCandidates(prev => prev.map((x, i) => i === idx ? {...x, text: ed} : x));
                      }}><Icon name="edit"/></button>
                      <button className="iconbtn" title="Regenerate" onClick={() => regenerateOne(idx)}><Icon name="refresh"/></button>
                      <button className={`iconbtn ${starred[c.id] ? 'on' : ''}`} title="Star"
                              onClick={() => setStarred(s => ({...s, [c.id]: !s[c.id]}))}><Icon name={starred[c.id] ? 'star' : 'starO'}/></button>
                      <button className="iconbtn" title="Copy" onClick={() => copyText(c.text)}><Icon name="copy"/></button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {candidates.length > 0 && (
            <div style={{
              marginTop:'auto',paddingTop:16,fontFamily:'var(--mono)',fontSize:10,
              color:'var(--ink-fade)',letterSpacing:'.12em',textTransform:'uppercase',
              display:'flex',justifyContent:'space-between',
            }}>
              <span>End of channel</span>
              <span>{candidates.filter(c => !c.streaming).length} drafted</span>
            </div>
          )}
        </div>
      </div>

      <footer className="statusbar">
        <div className="group">
          <span>● {phase === 'generating' ? 'Drafting' : ocrStatus === 'scanning' ? 'Scanning' : 'Idle'}</span>
          <div className="sep"/>
          <span>Model · {model.name}</span>
          {modelStatus === 'limit' && <><div className="sep"/><span style={{color:'var(--danger)'}}>● Limit reached</span></>}
          {modelStatus === 'warn'  && <><div className="sep"/><span style={{color:'var(--warn)'}}>● Near limit</span></>}
          <div className="sep"/>
          <span>Drafts · {candidates.filter(c => !c.streaming).length}</span>
        </div>
        <div className="group status-right">
          <span>GhostOperator v2 · End-to-end encrypted</span>
        </div>
      </footer>

      <TweaksPanelUI t={t} setTweak={setTweak}/>
      {toast && <div className="toast">▸ {toast}</div>}
    </div>
  );
}

// ─── Tweaks panel ─────────────────────────────────────────────────────────────
function TweaksPanelUI({ t, setTweak }) {
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Theme"/>
      <TweakColor
        label="Accent"
        value={t.theme === 'phosphor' ? '#9beab4' : t.theme === 'amber' ? '#f1b35a' : t.theme === 'cyan' ? '#8fd6ec' : '#b48aef'}
        options={['#9beab4','#f1b35a','#8fd6ec','#b48aef']}
        onChange={(v) => {
          const map = { '#9beab4':'phosphor', '#f1b35a':'amber', '#8fd6ec':'cyan', '#b48aef':'violet' };
          setTweak('theme', map[v] || 'phosphor');
        }}
      />
      <TweakRadio label="Density" value={t.density} options={['compact','regular']}
        onChange={(v) => setTweak('density', v)} />
      <TweakSection label="Display"/>
      <TweakToggle label="Show history panel" value={t.showHistory}
        onChange={(v) => setTweak('showHistory', v)} />
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
