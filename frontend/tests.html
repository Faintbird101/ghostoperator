<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GhostOperator — Frontend Tests</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      font-size: 14px;
      padding: 32px 24px;
    }
    h1 { font-size: 16px; margin-bottom: 6px; color: #aaa; font-weight: 500; }
    #summary { font-size: 13px; color: #555; margin-bottom: 28px; }
    #summary.done-pass { color: #22c55e; }
    #summary.done-fail { color: #ef4444; }
    .suite { margin-bottom: 24px; }
    .suite-name {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
      margin-bottom: 8px;
    }
    .test {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #1a1a1a;
      line-height: 1.4;
    }
    .badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 1px;
    }
    .pass .badge  { background: #14532d; color: #86efac; }
    .fail .badge  { background: #450a0a; color: #fca5a5; }
    .test-name    { flex: 1; color: #ccc; }
    .test-detail  { font-size: 12px; color: #ef4444; margin-top: 4px; }

    /* Hidden DOM fixtures app.js needs */
    #fixtures { display: none; }
  </style>
</head>
<body>

<h1>GhostOperator — Frontend Test Suite</h1>
<div id="summary">Running…</div>

<div id="results"></div>

<!-- Minimal DOM fixtures required by app.js -->
<div id="fixtures">
  <input type="file" id="file-input" />
  <div id="drop-zone">
    <div id="upload-hint"></div>
    <div id="image-holder">
      <img id="preview" />
      <div id="image-meta">
        <span id="file-name"></span>
        <button id="remove-btn"></button>
      </div>
    </div>
    <button id="browse-btn"></button>
  </div>
  <button id="generate-btn" disabled></button>
  <button id="clear-btn"></button>
  <section id="output-section">
    <div id="reply-box"></div>
    <button id="copy-btn" disabled></button>
  </section>
  <div id="toast-container"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Minimal test runner
// ─────────────────────────────────────────────────────────────────────────────

const suites   = [];
let currentSuite = null;

function describe(name, fn) {
  currentSuite = { name, tests: [] };
  suites.push(currentSuite);
  fn();
  currentSuite = null;
}

function it(name, fn) {
  currentSuite.tests.push({ name, fn });
}

function expect(actual) {
  return {
    toBe(expected) {
      if (actual !== expected)
        throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
    toContain(str) {
      if (!String(actual).includes(str))
        throw new Error(`Expected "${actual}" to contain "${str}"`);
    },
    toNotContain(str) {
      if (String(actual).includes(str))
        throw new Error(`Expected "${actual}" NOT to contain "${str}"`);
    },
    toBeTruthy() {
      if (!actual) throw new Error(`Expected truthy, got ${JSON.stringify(actual)}`);
    },
    toBeFalsy() {
      if (actual) throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
    },
    toEqual(expected) {
      if (JSON.stringify(actual) !== JSON.stringify(expected))
        throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    },
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// Pure helpers under test (copied from app.js so tests are self-contained)
// ─────────────────────────────────────────────────────────────────────────────

function friendlyError(raw, status) {
  if (!navigator.onLine)
    return "You're offline — check your connection.";
  if (status === 413)
    return "Image is too large. Try a smaller screenshot (max 20 MB).";
  if (status === 400)
    return "Couldn't read that image. Try saving it as PNG and uploading again.";
  if (status === 405)
    return "Unexpected request. Please refresh the page.";
  if (status >= 500)
    return "Server ran into a problem. Try again in a moment.";

  const msg = typeof raw === 'string' ? raw.toLowerCase() : '';
  if (msg.includes('api error'))
    return "The AI service hit an issue. Try again shortly.";
  if (msg.includes('fetch') || msg.includes('network') || msg.includes('failed to fetch'))
    return "Can't reach the server. Is GhostOperator still running?";
  return "Something went wrong — please try again.";
}

function parseSSEChunks(rawText) {
  const results = [];
  for (const line of rawText.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed.startsWith('data: ')) continue;
    const data = trimmed.slice(6).trim();
    if (data === '[DONE]') { results.push({ done: true }); continue; }
    try {
      results.push(JSON.parse(data));
    } catch {
      // skip malformed
    }
  }
  return results;
}

function isImageFile(file) {
  return file && file.type.startsWith('image/');
}

// ─────────────────────────────────────────────────────────────────────────────
// Test definitions
// ─────────────────────────────────────────────────────────────────────────────

describe('friendlyError — HTTP status codes', () => {
  it('maps 413 to file-too-large message', () => {
    expect(friendlyError('body too large', 413)).toContain('too large');
  });
  it('maps 400 to unreadable image message', () => {
    expect(friendlyError('bad request', 400)).toContain("Couldn't read");
  });
  it('maps 405 to refresh message', () => {
    expect(friendlyError('method not allowed', 405)).toContain('refresh');
  });
  it('maps 500 to server problem message', () => {
    expect(friendlyError('internal error', 500)).toContain('Server ran into');
  });
  it('maps 503 (>=500) to server problem message', () => {
    expect(friendlyError('service unavailable', 503)).toContain('Server ran into');
  });
  it('never leaks the raw HTTP status string to user', () => {
    expect(friendlyError('internal error', 500)).toNotContain('500');
  });
});

describe('friendlyError — network / AI errors', () => {
  it('maps "failed to fetch" to server-unreachable message', () => {
    expect(friendlyError('Failed to fetch')).toContain("Can't reach");
  });
  it('maps "network error" to server-unreachable message', () => {
    expect(friendlyError('network error')).toContain("Can't reach");
  });
  it('maps "api error" text to AI service message', () => {
    expect(friendlyError('API error 429: quota exceeded')).toContain('AI service');
  });
  it('has a safe fallback for unknown errors', () => {
    const msg = friendlyError('something totally unknown');
    expect(msg).toBeTruthy();
    expect(msg).toNotContain('unknown'); // fallback should not echo the raw message
  });
});

describe('parseSSEChunks — SSE stream parsing', () => {
  it('parses a valid text chunk', () => {
    const chunks = parseSSEChunks('data: {"text":"hello"}\n');
    expect(chunks.length).toBe(1);
    expect(chunks[0].text).toBe('hello');
  });

  it('parses multiple chunks', () => {
    const raw = 'data: {"text":"A"}\ndata: {"text":"B"}\ndata: {"text":"C"}\n';
    const chunks = parseSSEChunks(raw);
    expect(chunks.length).toBe(3);
    expect(chunks.map(c => c.text).join('')).toBe('ABC');
  });

  it('detects [DONE] sentinel', () => {
    const chunks = parseSSEChunks('data: {"text":"hi"}\ndata: [DONE]\n');
    expect(chunks[chunks.length - 1].done).toBe(true);
  });

  it('skips lines without "data: " prefix', () => {
    const chunks = parseSSEChunks('event: ping\n: comment\ndata: {"text":"ok"}\n');
    expect(chunks.length).toBe(1);
    expect(chunks[0].text).toBe('ok');
  });

  it('skips malformed JSON without crashing', () => {
    const chunks = parseSSEChunks('data: {broken json}\ndata: {"text":"fine"}\n');
    expect(chunks.length).toBe(1);
    expect(chunks[0].text).toBe('fine');
  });

  it('returns empty array for empty input', () => {
    expect(parseSSEChunks('').length).toBe(0);
  });

  it('parses error events', () => {
    const chunks = parseSSEChunks('data: {"error":"something went wrong"}\n');
    expect(chunks[0].error).toBe('something went wrong');
  });
});

describe('isImageFile — file type validation', () => {
  it('accepts image/png', () => {
    expect(isImageFile({ type: 'image/png' })).toBeTruthy();
  });
  it('accepts image/jpeg', () => {
    expect(isImageFile({ type: 'image/jpeg' })).toBeTruthy();
  });
  it('accepts image/webp', () => {
    expect(isImageFile({ type: 'image/webp' })).toBeTruthy();
  });
  it('rejects application/pdf', () => {
    expect(isImageFile({ type: 'application/pdf' })).toBeFalsy();
  });
  it('rejects text/plain', () => {
    expect(isImageFile({ type: 'text/plain' })).toBeFalsy();
  });
  it('rejects null', () => {
    expect(isImageFile(null)).toBeFalsy();
  });
});

describe('Toast DOM — creation and structure', () => {
  function createToastEl(message, type = 'error') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    const text = document.createElement('span');
    text.textContent = message;
    const close = document.createElement('button');
    close.className = 'toast-close';
    close.textContent = '✕';
    el.appendChild(text);
    el.appendChild(close);
    return el;
  }

  it('has correct CSS class for error type', () => {
    const el = createToastEl('oops', 'error');
    expect(el.classList.contains('toast-error')).toBeTruthy();
  });

  it('has correct CSS class for success type', () => {
    const el = createToastEl('done', 'success');
    expect(el.classList.contains('toast-success')).toBeTruthy();
  });

  it('displays the message text', () => {
    const el = createToastEl('Something went wrong');
    expect(el.querySelector('span').textContent).toBe('Something went wrong');
  });

  it('has a dismiss button with ✕ label', () => {
    const el = createToastEl('msg');
    const btn = el.querySelector('.toast-close');
    expect(btn).toBeTruthy();
    expect(btn.textContent).toBe('✕');
  });

  it('dismiss button removes the toast from DOM', () => {
    const container = document.createElement('div');
    const el = createToastEl('bye');
    container.appendChild(el);
    // Simulate dismiss
    el.remove();
    expect(container.children.length).toBe(0);
  });
});

// ─────────────────────────────────────────────────────────────────────────────
// Run and render results
// ─────────────────────────────────────────────────────────────────────────────

let passed = 0, failed = 0;
const resultsEl = document.getElementById('results');

for (const suite of suites) {
  const suiteEl = document.createElement('div');
  suiteEl.className = 'suite';
  const nameEl = document.createElement('div');
  nameEl.className = 'suite-name';
  nameEl.textContent = suite.name;
  suiteEl.appendChild(nameEl);

  for (const test of suite.tests) {
    let error = null;
    try { test.fn(); } catch (e) { error = e; }

    const ok = !error;
    if (ok) passed++; else failed++;

    const row = document.createElement('div');
    row.className = `test ${ok ? 'pass' : 'fail'}`;

    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = ok ? 'PASS' : 'FAIL';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'test-name';
    nameSpan.textContent = test.name;

    const inner = document.createElement('div');
    inner.style.flex = '1';
    inner.appendChild(nameSpan);
    if (error) {
      const detail = document.createElement('div');
      detail.className = 'test-detail';
      detail.textContent = error.message;
      inner.appendChild(detail);
    }

    row.appendChild(badge);
    row.appendChild(inner);
    suiteEl.appendChild(row);
  }

  resultsEl.appendChild(suiteEl);
}

const summary = document.getElementById('summary');
const total = passed + failed;
summary.textContent = `${passed}/${total} passed${failed > 0 ? ` · ${failed} failed` : ''}`;
summary.className = failed === 0 ? 'done-pass' : 'done-fail';
</script>
</body>
</html>
