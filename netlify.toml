[build]
  publish = "frontend"

[[redirects]]
  from   = "/api/*"
  to     = "https://ghostoperator.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/reply"
  to     = "https://ghostoperator.onrender.com/reply"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
