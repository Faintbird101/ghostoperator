server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy → Go backend ─────────────────────────────────────────────
    # SSE streams (draft-replies) need buffering disabled and a long timeout.
    location /api/ {
        proxy_pass         http://backend:9898;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # SSE / streaming — must disable buffering
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Legacy /reply endpoint (same SSE proxy requirements)
    location /reply {
        proxy_pass         http://backend:9898;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Static frontend files ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Suppress noisy access logs for favicon / health checks
    location = /favicon.ico { access_log off; log_not_found off; }
}
